<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wash Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0f1115;
    --card:#181c24;
    --border:#262c36;
    --text:#f1f5f9;
    --muted:#94a3b8;
    --green:#22c55e;
    --yellow:#facc15;
    --red:#ef4444;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Inter,sans-serif;
    padding:24px;
}

.container{
    max-width:1400px;
    margin:auto;
}

h1{
    margin-bottom:20px;
}

.grid{
    display:grid;
    gap:20px;
    grid-template-columns:350px 1fr;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
}

.card-header{
    padding:16px;
    border-bottom:1px solid var(--border);
    font-weight:600;
}

.card-body{
    padding:16px;
}

input,select{
    width:100%;
    background:#11151c;
    color:white;
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px;
}

button{
    background:var(--green);
    color:black;
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    opacity:.9;
}

.stack{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-bottom:20px;
}

.stat{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:20px;
}

.stat-label{
    color:var(--muted);
    font-size:12px;
}

.stat-value{
    margin-top:8px;
    font-size:24px;
    font-weight:700;
}

.green{color:var(--green);}
.yellow{color:var(--yellow);}
.red{color:var(--red);}

.member{
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid var(--border);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    text-align:left;
    padding:12px;
}

thead{
    background:#11151c;
}

tbody tr{
    border-bottom:1px solid var(--border);
}

@media(max-width:900px){
    .grid{
        grid-template-columns:1fr;
    }

    .stats{
        grid-template-columns:1fr;
    }
}
</style>

</head>
<body>

<div class="container">

<h1>Wash Tracker</h1>

<div class="stats">
    <div class="stat">
        <div class="stat-label">TOTAL DIRTY</div>
        <div class="stat-value red" id="totalDirty">$0</div>
    </div>

```
<div class="stat">
    <div class="stat-label">TOTAL CUT</div>
    <div class="stat-value yellow" id="totalCut">$0</div>
</div>

<div class="stat">
    <div class="stat-label">TOTAL CLEAN</div>
    <div class="stat-value green" id="totalClean">$0</div>
</div>
```

</div>

<div class="grid">

<div class="stack">

<div class="card">
<div class="card-header">Add Member</div>
<div class="card-body stack">
<input id="memberName" placeholder="Member Name">
<button id="addMemberBtn">Add Member</button>
</div>
</div>

<div class="card">
<div class="card-header">Members</div>
<div id="memberList"></div>
</div>

</div>

<div class="stack">

<div class="card">
<div class="card-header">Log Wash</div>
<div class="card-body stack">

<select id="memberSelect"></select>

<input
type="number"
id="dirtyAmount"
placeholder="Dirty Amount">

<button id="logWashBtn">
Log Wash
</button>

</div>
</div>

<div class="card">
<div class="card-header">History</div>

<table>
<thead>
<tr>
<th>Member</th>
<th>Dirty</th>
<th>Cut</th>
<th>Clean</th>
</tr>
</thead>

<tbody id="txTable"></tbody>

</table>

</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const CUT = 0.24;

const membersCol = collection(db,"members");
const txCol = collection(db,"transactions");

const money = n =>
"$"+Math.round(n).toLocaleString();

document.getElementById("addMemberBtn")
.onclick = async () => {

const name =
document.getElementById("memberName")
.value.trim();

if(!name) return;

await addDoc(membersCol,{
name,
createdAt:serverTimestamp()
});

document.getElementById("memberName")
.value="";
};

document.getElementById("logWashBtn")
.onclick = async () => {

const member =
JSON.parse(
document.getElementById("memberSelect")
.value
);

const dirty =
Number(
document.getElementById("dirtyAmount")
.value
);

if(!dirty) return;

const cut = dirty * CUT;
const clean = dirty - cut;

await addDoc(txCol,{
memberId:member.id,
memberName:member.name,
dirty,
cut,
clean,
createdAt:serverTimestamp()
});

document.getElementById("dirtyAmount")
.value="";
};

onSnapshot(membersCol,snap=>{

const members=[];

snap.forEach(doc=>{
members.push({
id:doc.id,
...doc.data()
});
});

document.getElementById("memberList")
.innerHTML =
members.map(m=>`
<div class="member">
<span>${m.name}</span>
</div>
`).join("");

document.getElementById("memberSelect")
.innerHTML =
members.map(m=>`
<option value='${JSON.stringify(m)}'>
${m.name}
</option>
`).join("");

});

onSnapshot(
query(txCol,orderBy("createdAt","desc")),
snap=>{

let dirty=0;
let cut=0;
let clean=0;

const rows=[];

snap.forEach(doc=>{

const tx=doc.data();

dirty+=tx.dirty;
cut+=tx.cut;
clean+=tx.clean;

rows.push(`
<tr>
<td>${tx.memberName}</td>
<td>${money(tx.dirty)}</td>
<td>${money(tx.cut)}</td>
<td>${money(tx.clean)}</td>
</tr>
`);

});

document.getElementById("txTable")
.innerHTML = rows.join("");

document.getElementById("totalDirty")
.textContent = money(dirty);

document.getElementById("totalCut")
.textContent = money(cut);

document.getElementById("totalClean")
.textContent = money(clean);

});

</script>

</body>
</html>
